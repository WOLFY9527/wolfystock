
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WolfyStock · Research Workbench</title>
  <style>
    :root{
      --paper:#F5F0EB;
      --paper-deep:#E9DFD3;
      --surface:#FBF8F3;
      --surface-soft:rgba(255,255,255,.56);
      --ink:#25221D;
      --ink-soft:#3D3831;
      --muted:#746B60;
      --muted-2:#9B9184;
      --line:rgba(54,48,40,.16);
      --line-strong:rgba(54,48,40,.3);
      --sage:#6B8F71;
      --sage-deep:#365D3D;
      --sage-wash:#DCE7DC;
      --gold:#D4A574;
      --gold-wash:#EFE0C9;
      --blue:#6F8FA1;
      --danger:#A75E55;
      --danger-wash:#F0DCD8;
      --ok:#5D8663;
      --warn:#AA7A3D;
      --shadow:0 18px 44px rgba(55,44,31,.09);
      --shadow-tight:0 8px 20px rgba(55,44,31,.07);
      --radius:18px;
      --radius-sm:12px;
      --font-display:"Noto Serif SC","Songti SC","STSong","Iowan Old Style",Georgia,serif;
      --font-body:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
      --font-mono:"SFMono-Regular","JetBrains Mono",ui-monospace,Menlo,monospace;
      --ease:cubic-bezier(.16,1,.3,1);
    }

    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;color:var(--ink)}
    body{
      font-family:var(--font-body);
      background:
        linear-gradient(90deg,rgba(37,33,27,.035) 1px,transparent 1px),
        linear-gradient(rgba(37,33,27,.03) 1px,transparent 1px),
        linear-gradient(180deg,#F7F2EC 0%,var(--paper) 44%,#EFE7DE 100%);
      background-size:36px 36px,36px 36px,100% 100%;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      overflow-x:hidden;
    }
    body:after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.26;
      background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.22) 0 1px,transparent 1px 5px);
      mix-blend-mode:multiply;
      z-index:-1;
    }
    a{color:inherit;text-decoration:none}
    button,input,select{font:inherit}
    button{cursor:pointer}
    :focus-visible{
      outline:3px solid color-mix(in srgb,var(--gold) 72%,white);
      outline-offset:3px;
    }
    .skip-link{
      position:fixed;
      top:10px;
      left:12px;
      z-index:99;
      transform:translateY(-140%);
      padding:9px 13px;
      border-radius:999px;
      background:var(--ink);
      color:white;
      font-weight:800;
      font-size:13px;
      transition:transform .16s var(--ease);
    }
    .skip-link:focus{transform:translateY(0)}
    .sr-only{
      position:absolute!important;
      width:1px;height:1px;
      padding:0;margin:-1px;
      overflow:hidden;
      clip:rect(0,0,0,0);
      white-space:nowrap;
      border:0;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      background:rgba(245,240,235,.93);
      border-bottom:1px solid var(--line);
      backdrop-filter:blur(18px);
    }
    .nav{
      max-width:1880px;
      margin:0 auto;
      padding:9px 18px;
      display:grid;
      grid-template-columns:auto minmax(0,1fr) auto;
      gap:16px;
      align-items:center;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:850;
      white-space:nowrap;
      letter-spacing:.01em;
    }
    .seal{
      width:34px;
      height:34px;
      border-radius:50%;
      border:1px solid var(--line-strong);
      background:radial-gradient(circle at 35% 30%,#fff 0 16%,var(--gold-wash) 17% 39%,var(--sage) 40% 100%);
      display:grid;
      place-items:center;
      flex:0 0 auto;
    }
    .seal svg{width:21px;height:21px}
    .navlinks{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:3px;
      min-width:0;
      overflow:auto;
      scrollbar-width:none;
    }
    .navlinks::-webkit-scrollbar{display:none}
    .navlink,.more-btn{
      border:0;
      background:transparent;
      color:var(--muted);
      min-height:34px;
      padding:0 10px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      font-size:12px;
      font-weight:820;
      white-space:nowrap;
      transition:background .14s var(--ease),color .14s var(--ease),transform .14s var(--ease);
    }
    .navlink:hover,.more-btn:hover{
      background:rgba(107,143,113,.1);
      color:var(--sage-deep);
    }
    .navlink.active,.more-btn.active,.navlink[aria-current="page"]{
      background:rgba(107,143,113,.14);
      color:var(--sage-deep);
      box-shadow:inset 0 0 0 1px rgba(107,143,113,.1);
    }
    .navlink:active,.more-btn:active,.btn:active{transform:translateY(1px)}
    .more{position:relative}
    .more-menu{
      position:absolute;
      right:0;
      top:40px;
      min-width:218px;
      display:none;
      padding:7px;
      border:1px solid var(--line);
      border-radius:14px;
      background:rgba(255,255,255,.97);
      box-shadow:var(--shadow);
      transform-origin:top right;
    }
    .more.open .more-menu{display:grid;gap:3px;animation:menuIn .14s var(--ease) both}
    .more-menu a{
      display:flex;
      justify-content:space-between;
      gap:12px;
      padding:10px;
      border-radius:11px;
      color:var(--muted);
      font-size:12px;
      font-weight:780;
    }
    .more-menu a:hover,.more-menu a.active{
      background:rgba(107,143,113,.1);
      color:var(--sage-deep);
    }
    .right-tools{display:flex;align-items:center;gap:8px}
    .search{
      position:relative;
      width:min(390px,25vw);
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(255,255,255,.66);
      display:flex;
      align-items:center;
      gap:8px;
      padding:8px 11px;
      transition:background .14s var(--ease),border-color .14s var(--ease);
    }
    .search:focus-within{background:#fff;border-color:rgba(107,143,113,.5)}
    .search input{width:100%;border:0;background:transparent;outline:0;font-size:13px;color:var(--ink)}
    .search kbd{
      font:10px/1 var(--font-mono);
      color:var(--muted);
      border:1px solid var(--line);
      border-radius:7px;
      padding:3px 5px;
      background:rgba(255,255,255,.65);
    }
    .tool-chip{
      min-height:34px;
      padding:0 10px;
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(255,255,255,.5);
      display:inline-flex;
      align-items:center;
      color:var(--muted);
      font-size:11px;
      font-weight:820;
      white-space:nowrap;
    }
    .search-results{
      display:none;
      position:absolute;
      right:0;
      top:44px;
      width:410px;
      max-width:88vw;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
      padding:7px;
      box-shadow:var(--shadow);
    }
    .search-results.open{display:block;animation:menuIn .14s var(--ease) both}
    .result{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      padding:10px;
      border-radius:10px;
      cursor:pointer;
    }
    .result:hover,.result:focus{background:rgba(107,143,113,.1)}
    .result-empty{
      padding:14px;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .shell{
      width:100%;
      max-width:1880px;
      margin:0 auto;
      padding:14px 18px 38px;
    }
    .page-head{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:18px;
      align-items:end;
      margin:4px 0 12px;
      padding-bottom:10px;
      border-bottom:1px solid var(--line);
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:var(--sage-deep);
      font:820 11px var(--font-mono);
      letter-spacing:.12em;
      text-transform:uppercase;
    }
    .dot{width:7px;height:7px;border-radius:50%;background:var(--gold)}
    h1,h2,h3{margin:0;font-family:var(--font-display);font-weight:720;letter-spacing:-.035em}
    h1{margin:10px 0 7px;max-width:1080px;font-size:clamp(34px,4.1vw,66px);line-height:.99;text-wrap:balance}
    h2{font-size:clamp(26px,2.8vw,42px);line-height:1.06}
    h3{font-size:20px;line-height:1.13}
    .lead{margin:0;max-width:1060px;color:var(--muted);font-size:clamp(15px,1vw,17px);line-height:1.58}
    .status-row{display:flex;flex-wrap:wrap;gap:7px;justify-content:flex-end}
    .badge{
      min-height:27px;
      padding:0 9px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.62);
      color:var(--muted);
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:11px;
      font-weight:830;
      white-space:nowrap;
    }
    .badge.ok{background:rgba(107,143,113,.12);color:var(--sage-deep)}
    .badge.gold{background:rgba(212,165,116,.17);border-color:rgba(212,165,116,.4);color:#76522F}
    .badge.danger{background:var(--danger-wash);border-color:rgba(167,94,85,.32);color:#7A3F38}
    .ticker{font-family:var(--font-mono);font-size:11px;color:var(--sage-deep)}
    .muted{color:var(--muted)}
    .up{color:var(--ok)}.down{color:var(--danger)}.flat{color:var(--warn)}

    .grid-12{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:10px}
    .span-2{grid-column:span 2}.span-3{grid-column:span 3}.span-4{grid-column:span 4}.span-5{grid-column:span 5}.span-6{grid-column:span 6}.span-7{grid-column:span 7}.span-8{grid-column:span 8}.span-9{grid-column:span 9}.span-12{grid-column:span 12}
    .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
    .grid-6{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}

    .panel{
      border:1px solid var(--line);
      border-radius:var(--radius);
      background:rgba(251,248,243,.76);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .primary-card{padding:16px}
    .card{
      padding:13px;
      border:1px solid var(--line);
      border-radius:var(--radius-sm);
      background:rgba(255,255,255,.5);
    }
    .section-rule{border-top:1px solid var(--line);padding-top:12px;margin-top:12px}
    .card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
    .fig{color:var(--muted);font:11px var(--font-mono);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
    .brief{
      display:grid;
      gap:9px;
      padding:14px;
      border-radius:14px;
      border:1px solid rgba(107,143,113,.2);
      background:linear-gradient(180deg,rgba(220,231,220,.55),rgba(255,255,255,.36));
    }
    .brief strong{font-family:var(--font-display);font-size:24px;line-height:1.12;letter-spacing:-.03em}
    .brief p{margin:0;color:var(--muted);line-height:1.52;font-size:14px}
    .btn{
      min-height:35px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:7px;
      padding:0 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.66);
      color:var(--ink);
      font-weight:830;
      font-size:12px;
      transition:background .14s var(--ease),border-color .14s var(--ease),transform .14s var(--ease),opacity .14s var(--ease);
    }
    .btn:hover{background:#fff;border-color:var(--line-strong)}
    .btn:active{transform:translateY(1px)}
    .btn.primary{background:var(--sage);border-color:var(--sage);color:#fff}
    .btn.primary:hover{background:var(--sage-deep)}
    .btn.gold{background:rgba(212,165,116,.2);border-color:rgba(212,165,116,.42);color:#76522F}
    .btn[disabled],.btn[aria-disabled="true"]{opacity:.45;cursor:not-allowed;transform:none}

    .metric .label{font-size:11px;color:var(--muted);letter-spacing:.07em;text-transform:uppercase}
    .metric .value{font:820 25px/1.02 var(--font-mono);letter-spacing:-.06em;margin:7px 0 4px}
    .metric span{font-size:12px}
    .chart{
      width:100%;
      min-height:274px;
      border-radius:14px;
      overflow:hidden;
      border:1px solid rgba(54,48,40,.08);
      background:
        linear-gradient(rgba(37,33,27,.045) 1px,transparent 1px),
        linear-gradient(90deg,rgba(37,33,27,.035) 1px,transparent 1px),
        rgba(255,255,255,.3);
      background-size:42px 42px;
    }
    .chart.compact{min-height:188px}
    .chart svg{display:block;width:100%;height:100%;min-height:inherit}
    .seg{
      display:flex;
      flex-wrap:wrap;
      padding:3px;
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(255,255,255,.6)
    }
    .seg button{
      border:0;
      background:transparent;
      border-radius:999px;
      padding:7px 9px;
      color:var(--muted);
      font-size:11px;
      font-weight:830;
    }
    .seg button:hover{background:rgba(107,143,113,.1);color:var(--sage-deep)}
    .seg button.active{background:var(--sage);color:white}
    .row-list{display:grid;gap:7px}
    .row{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      align-items:center;
      padding:10px;
      border:1px solid var(--line);
      border-radius:12px;
      background:rgba(255,255,255,.44);
    }
    .row b{display:block;font-size:13px}
    .row small{color:var(--muted);font-size:12px;line-height:1.42}
    .spark{width:90px;height:33px}

    .research-strip{
      display:grid;
      grid-template-columns:1.2fr .9fr .9fr auto;
      gap:10px;
      align-items:center;
      padding:10px;
      border:1px solid var(--line);
      border-radius:12px;
      background:rgba(255,255,255,.45);
    }
    .research-strip b{display:block;font-size:13px}
    .research-strip small{display:block;color:var(--muted);font-size:12px;line-height:1.45}
    .research-strip .action-stack{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}

    .candidate{
      text-align:left;
      padding:13px;
      border:1px solid var(--line);
      border-radius:14px;
      background:rgba(255,255,255,.5);
      transition:transform .14s var(--ease),border-color .14s var(--ease),background .14s var(--ease);
    }
    .candidate:hover{transform:translateY(-1px);border-color:rgba(107,143,113,.38)}
    .candidate.active{border-color:rgba(107,143,113,.62);background:rgba(220,231,220,.62)}
    .candidate h3{font-size:18px;margin:4px 0}
    .candidate p{margin:0;color:var(--muted);font-size:12px;line-height:1.45}
    .radar-wrap{min-height:308px;display:grid;place-items:center}
    .radar-wrap svg{width:100%;max-height:344px}
    .factor-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
    .factor{padding:10px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.5)}
    .factor span{display:block;color:var(--muted);font-size:11px;margin-bottom:7px}
    .bar{height:7px;border-radius:999px;background:rgba(37,33,27,.08);overflow:hidden}
    .bar i{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--sage),var(--gold));transition:width .36s var(--ease)}

    .form-grid{display:grid;gap:10px}
    label.field span{display:block;color:var(--muted);font-size:11px;font-weight:830;margin-bottom:6px}
    .field input,.field select{
      width:100%;
      padding:10px 11px;
      border:1px solid var(--line);
      border-radius:11px;
      background:rgba(255,255,255,.68);
      outline:0;
      color:var(--ink);
      font-size:13px;
    }
    .field input:focus,.field select:focus{border-color:rgba(107,143,113,.5);background:#fff}
    input[type=range]{width:100%;accent-color:var(--sage)}
    table{width:100%;border-collapse:separate;border-spacing:0 6px;min-width:860px}
    caption{text-align:left;color:var(--muted);font:11px var(--font-mono);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
    th{text-align:left;color:var(--muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:0 10px}
    td{
      padding:10px;
      background:rgba(255,255,255,.46);
      border-top:1px solid var(--line);
      border-bottom:1px solid var(--line);
      font-size:13px;
      vertical-align:middle;
    }
    tbody tr:hover td{background:rgba(255,255,255,.7)}
    td:first-child{border-left:1px solid var(--line);border-radius:11px 0 0 11px}
    td:last-child{border-right:1px solid var(--line);border-radius:0 11px 11px 0}
    .table-wrap{overflow:auto}
    details{border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.48);overflow:hidden}
    summary{list-style:none;cursor:pointer;padding:12px 14px;font-weight:830;display:flex;justify-content:space-between;gap:12px;font-size:13px}
    summary::-webkit-details-marker{display:none}
    details p{margin:0;padding:0 14px 14px;color:var(--muted);line-height:1.55;font-size:13px}
    .state-card{
      min-height:244px;
      padding:24px;
      border:1px dashed var(--line-strong);
      border-radius:14px;
      background:rgba(255,255,255,.45);
      display:grid;
      place-items:center;
      text-align:center;
    }
    .state-card h3{margin:8px 0}
    .state-card p{max-width:460px;margin:0 auto;color:var(--muted);font-size:14px;line-height:1.55}
    .spinner{
      width:32px;
      height:32px;
      border-radius:50%;
      border:3px solid rgba(107,143,113,.18);
      border-top-color:var(--sage);
      animation:spin .9s linear infinite;
    }
    .skeleton{
      display:block;
      height:14px;
      border-radius:999px;
      background:linear-gradient(90deg,rgba(255,255,255,.25),rgba(107,143,113,.14),rgba(255,255,255,.25));
      background-size:200% 100%;
      animation:shimmer 1.2s linear infinite;
    }
    .ledger-note{font-size:12px;color:var(--muted);line-height:1.5}
    .is-animating{will-change:transform,opacity;backface-visibility:hidden}

    @keyframes menuIn{from{opacity:0;transform:translateY(-3px) scale(.992)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes shimmer{to{background-position:-200% 0}}
    @media (prefers-reduced-motion:reduce){
      *,*::before,*::after{animation-duration:.001ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important;transition:none!important}
    }
    @media (max-width:1280px){
      .nav{grid-template-columns:1fr}
      .navlinks{justify-content:flex-start}
      .right-tools{width:100%}
      .search{width:100%}
      .page-head{grid-template-columns:1fr}
      .status-row{justify-content:flex-start}
      .span-2,.span-3,.span-4{grid-column:span 6}
      .span-5,.span-6,.span-7,.span-8,.span-9{grid-column:span 12}
      .grid-5,.grid-6{grid-template-columns:repeat(3,1fr)}
      .research-strip{grid-template-columns:1fr 1fr}
      .research-strip .action-stack{justify-content:flex-start}
    }
    @media (max-width:760px){
      .shell{padding:12px 12px 34px}
      .nav{padding:10px 12px}
      h1{font-size:37px}
      .span-2,.span-3,.span-4,.span-5,.span-6,.span-7,.span-8,.span-9,.span-12{grid-column:span 12}
      .grid-2,.grid-3,.grid-4,.grid-5,.grid-6,.factor-grid,.research-strip{grid-template-columns:1fr}
      .tool-chip{display:none}
      table{min-width:760px}
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#app">跳到主要内容</a>

  <header class="topbar" data-od-id="topbar">
    <nav class="nav" data-od-id="main-navigation" aria-label="WolfyStock 主导航">
      <a class="brand route-link" href="home.html" data-page="home" data-od-id="brand-link" aria-label="WolfyStock 首页">
        <span class="seal" aria-hidden="true">
          <svg viewBox="0 0 48 48" fill="none" aria-hidden="true">
            <path d="M12 30c7-2 9-15 14-15 4 0 5 8 10 8" stroke="#355B3B" stroke-width="3" stroke-linecap="round"/>
            <path d="M14 35c6-7 13-6 21-4" stroke="#D4A574" stroke-width="3" stroke-linecap="round"/>
          </svg>
        </span>
        <span>WolfyStock</span>
      </a>

      <div class="navlinks" data-od-id="primary-nav">

      anim.addEventListener("finish",done,{once:true});
      anim.addEventListener("cancel",done,{once:true});
      return anim;
    }

      const done=()=>{path.style.strokeDasharray="";path.style.strokeDashoffset="";motion.active=motion.active.filter(a=>a!==anim)};

      anim.addEventListener("cancel",done,{once:true});
    }

        ${["技术结构|趋势未破坏|价格位于 MA20 上方，但斜率趋缓。","基本面|现金流稳健|近季利润率稳定，硬件周期仍需观察。","事件 / 催化|发布会临近|新品预期可能影响短期波动。","同业比较|弱于 NVDA|AI 主题弹性不如半导体龙头。","风险触发|跌破 MA20|若放量跌破，趋势评分下调。","数据限制|报价延迟|盘中动作需开盘后复核。"].map(x=>{const p=x.split("|");return `<div class="card span-2"><div class="fig">${p[0]}</div><h3>${p[1]}</h3><p class="muted" style="font-size:13px;line-height:1.45">${p[2]}</p></div>`}).join("")}
        <section class="panel primary-card span-12"><div class="card-head"><div><div class="fig">Evidence ledger</div><h3>证据账本</h3></div><div class="seg"><button class="active">全部</button><button>技术</button><button>财务</button><button>风险</button></div></div><div class="grid-3 section-rule"><details open><summary>技术证据 <span>展开</span></summary><p>近期价格高于 MA20，但成交量未同步放大；若跌破短期均线，趋势评分会下降。</p></details><details><summary>数据来源与限制 <span>展开</span></summary><p>报价存在延迟，历史 OHLCV 可用；盘前数据不完整，因此不直接给出交易动作。</p></details><details><summary>同业与主题 <span>展开</span></summary><p>与 NVDA 相比主题弹性不足，但稳定性更强；适合作为观察型核心资产。</p></details></div></section>
      </section>`;
    }

    function watchlist(){
      return `${header(pageMeta.watchlist)}
      <section class="grid-12">
        <div class="panel primary-card span-3"><div class="fig">Needs review</div><h3>NVDA 重新入队</h3><p class="muted">相对强度上升，波动同步抬高。</p><span class="badge gold">今日复查</span></div>
        <div class="panel primary-card span-3"><div class="fig">Price trigger</div><h3>AAPL 接近 MA20</h3><p class="muted">需要确认是否守住短期结构。</p><span class="badge ok">观察</span></div>
        <div class="panel primary-card span-3"><div class="fig">Data change</div><h3>MSFT 证据提升</h3><p class="muted">财务与价格结构同时改善。</p><span class="badge ok">稳定</span></div>
        <div class="panel primary-card span-3"><div class="fig">Risk queue</div><h3>无新增高危提醒</h3><p class="muted">当前没有需要立即处理的风险事件。</p><span class="badge">正常</span></div>
        <section class="panel primary-card table-wrap span-12"><div class="card-head"><div><div class="fig">Watchlist ledger</div><h3>研究任务账本</h3></div><button class="btn primary">添加标的</button></div><table><caption>价格、结构状态、证据质量与下一步动作</caption><thead><tr><th>Symbol</th><th>最新价格</th><th>今日变化</th><th>结构状态</th><th>证据质量</th><th>最近触发</th><th>下一步</th><th>操作</th></tr></thead><tbody>${stocks.concat(stocks.slice(0,3)).map((s,i)=>`<tr><td><b>${s.symbol}</b><br><span class="muted">${s.name}</span></td><td>${s.price}</td><td class="${s.change.includes("-")?"down":"up"}">${s.change}</td><td>趋势观察</td><td>${s.quality}</td><td>${s.note}</td><td>${i%2?"等开盘量能":"复查证据"}</td><td><a class="btn route-link" href="stock-detail.html" data-page="stock">查看</a></td></tr>`).join("")}</tbody></table></section>
      </section>`;
    }

    function scanner(){
      return `${header(pageMeta.scanner)}
      <section class="grid-12">
        <aside class="panel primary-card span-3"><div class="fig">Scan setup</div><h3>扫描策略</h3><div class="form-grid section-rule"><label class="field"><span>市场</span><select id="scanMarket"><option>US</option><option>CN</option><option>HK</option></select></label><label class="field"><span>策略模板</span><select id="scanTemplate"><option>趋势延续</option><option>波动压缩突破</option><option>相对强度</option><option>回撤修复</option></select></label><label class="field"><span>数据要求</span><select id="dataMode"><option>只看数据完整标的</option><option>允许部分数据</option></select></label><label class="field"><span>Top N</span><input id="scanTop" type="number" value="20" min="5" max="100"></label><button class="btn primary" id="runScan">运行扫描</button></div></aside>
        <div class="panel primary-card span-9" id="scannerResultsWrap"><div class="card-head"><div><div class="fig">Scan results</div><h3>候选结果</h3></div><span class="badge ok" id="scanStatusBadge">可加入雷达</span></div><div class="table-wrap" id="scanTableHost" aria-live="polite"></div></div>
      </section>`;
    }

    function backtest(){
      return `${header(pageMeta.backtest)}
      <section class="grid-12">
        <aside class="panel primary-card span-3"><div class="fig">Strategy template</div><h3>回测配置</h3><div class="form-grid section-rule"><label class="field"><span>策略模板</span><select><option>趋势延续</option><option>均线回踩</option><option>波动压缩突破</option><option>防守轮动</option></select></label><label class="field"><span>标的</span><input value="AAPL, NVDA, MSFT"></label><label class="field"><span>时间范围</span><select><option>近 5 年</option><option>近 3 年</option><option>近 1 年</option></select></label><label class="field"><span>Benchmark</span><select><option>SPY</option><option>QQQ</option></select></label><button class="btn primary">运行回测</button></div></aside>
        <div class="panel primary-card span-6"><div class="card-head"><div><div class="fig">Equity curve</div><h3>回测结果</h3></div><span class="badge gold">样本足够</span></div>${chart("#6B8F71")}</div>
        <div class="span-3 grid-2">${metrics([["年化收益","18.4%","vs SPY 8.7%","up"],["最大回撤","-12.8","中等","flat"],["胜率","61%","60 月","up"],["交易次数","48","月度再平衡",""],["夏普","1.21","可接受","ok"],["换手","中","成本可控","flat"]])}</div>
        <section class="panel primary-card table-wrap span-12"><div class="fig">Where it breaks</div><table><caption>样本交易与策略失效环境</caption><thead><tr><th>日期</th><th>标的</th><th>信号</th><th>持有期</th><th>收益</th><th>回撤贡献</th><th>备注</th></tr></thead><tbody>${["2024-02-12|NVDA|趋势延续|34 日|+18.2%|-3.1%|主题强势","2024-04-08|AAPL|均线回踩|21 日|+6.4%|-2.2%|量能不足","2024-06-18|MSFT|防守轮动|42 日|+9.8%|-1.7%|结构稳定"].map(r=>`<tr>${r.split("|").map(v=>`<td class="${v.includes("+")?"up":v.includes("-")?"down":""}">${v}</td>`).join("")}</tr>`).join("")}</tbody></table></section>
      </section>`;
    }

    function scenario(){
      return `${header(pageMeta.scenario)}
      <section class="grid-12">
        <aside class="panel primary-card span-3"><div class="fig">Scenario parameters</div><h3>情景参数</h3><div class="form-grid section-rule"><label class="field"><span>预设情景</span><select><option>VIX 冲击</option><option>利率上行</option><option>美元走强</option><option>AI 主题回调</option></select></label><label class="field"><span>冲击幅度 <b id="shockVal">+18%</b></span><input id="shock" type="range" min="5" max="40" value="18" aria-label="冲击幅度"></label><label class="field"><span>影响时间 <b id="timeVal">10 日</b></span><input id="time" type="range" min="1" max="30" value="10" aria-label="影响时间"></label><button class="btn primary" id="runScenario">重算冲击路径</button></div></aside>
        <div class="panel primary-card span-5"><div class="card-head"><div><div class="fig">Impact map</div><h3>影响地图</h3></div><span class="badge gold">代理数据</span></div>${radar()}</div>
        <div class="span-4 grid-2">${metrics([["科技成长","高","估值敏感","down"],["防御消费","中","相对稳定","flat"],["金融股","低","利率相关","up"],["美元资产","中","相关性提升","flat"],["波动因子","高","需降仓","down"],["现金权重","+5%","建议上调","gold"]])}</div>
      </section>`;
    }

    const renderers={home,market,radar:radarPage,stock,watchlist,scanner,backtest,scenario};

    function setActive(page){
      document.querySelectorAll(".navlink,.more-menu a").forEach(a=>{
        const active=a.dataset.page===page;
        a.classList.toggle("active",active);
        active?a.setAttribute("aria-current","page"):a.removeAttribute("aria-current");
      });
      document.getElementById("moreButton").classList.toggle("active",["scanner","backtest","scenario"].includes(page));
    }
    function render(page,push=true){
      const key=renderers[page]?page:"home";
      const app=document.getElementById("app");
      cancelMotions();
      app.innerHTML=renderers[key]();
      document.title=`WolfyStock · ${pageMeta[key].label}`;
      document.getElementById("liveStatus").textContent=`已打开 ${pageMeta[key].label}`;
      setActive(key);
      bindPage(key);
      if(push) history.pushState({page:key},"",pageMeta[key].file);
      window.scrollTo({top:0,left:0,behavior:"auto"});
      routeMotion();
      requestAnimationFrame(()=>app.focus({preventScroll:true}));
    }
    function currentPage(){return pathToPage[window.location.pathname.replace(/\\/g,"/")]||"home"}
    function bindRoutes(){
      document.body.addEventListener("click",e=>{
        const l=e.target.closest(".route-link");
        if(l&&l.dataset.page){
          e.preventDefault();
          closeMore();
          render(l.dataset.page,true);
        }
      });
    }
    function bindPage(page){
      document.querySelectorAll(".range").forEach(btn=>btn.addEventListener("click",()=>{
        btn.parentElement.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        micro(btn.closest(".panel")?.querySelector(".chart")||btn.closest(".panel"));
      }));
      if(page==="radar"){
        const data=[
          {title:"AAPL 结构评分：82",why:"趋势仍在，但动能放缓。",next:"下一步：观察开盘后是否守住近 20 日均线区域，并检查成交量是否放大。",f:[78,82,64,72,86]},
          {title:"NVDA 结构评分：88",why:"AI 主题与相对强度同步上升。",next:"下一步：确认波动率没有继续扩张，避免追高。",f:[92,94,72,88,80]},
          {title:"MSFT 结构评分：80",why:"云业务韧性与价格结构较稳定。",next:"下一步：观察财报后市场是否继续给予估值溢价。",f:[76,78,60,74,84]},
          {title:"600519 结构评分：74",why:"防御属性稳定，但短期弹性有限。",next:"下一步：跟踪消费数据和估值分位是否继续改善。",f:[70,62,58,68,82]},
          {title:"300750 结构评分：70",why:"修复观察，但量能确认不足。",next:"下一步：等待成交放大和行业温度改善。",f:[64,72,66,58,70]}
        ];
        document.querySelectorAll(".candidate").forEach(btn=>btn.addEventListener("click",()=>{
          document.querySelectorAll(".candidate").forEach(b=>{b.classList.remove("active");b.setAttribute("aria-pressed","false")});
          btn.classList.add("active");
          btn.setAttribute("aria-pressed","true");
          const item=data[+btn.dataset.candidate];
          radarTitle.textContent=item.title;
          radarWhy.textContent=item.why;
          radarNext.textContent=item.next;
          item.f.forEach((v,i)=>document.getElementById("factor"+i).style.width=v+"%");
          micro(radarPanel);
          micro(radarReasonPanel);
        }));
      }
      if(page==="scanner"){
        const rows=[["01","NVDA","88","相对强度与主题热度同步上升","波动偏高","延迟","先看风险"],["02","AAPL","82","回踩短期均线后仍未破位","动能放缓","历史数据可用","等开盘量"],["03","MSFT","80","云业务韧性与趋势结构稳定","催化不足","实时","加入观察"],["04","600519","74","防御资产中证据质量较高","弹性有限","历史数据可用","低吸观察"],["05","300750","70","估值修复但量能不足","波动未收敛","延迟","等待确认"]];
        const table=(slice)=>`<table><caption>扫描结果 · 排名、分数、原因、风险限制和下一步</caption><thead><tr><th>排名</th><th>候选</th><th>分数</th><th>原因</th><th>风险限制</th><th>数据状态</th><th>下一步</th><th>操作</th></tr></thead><tbody>${slice.map(r=>`<tr><td>${r[0]}</td><td><b>${r[1]}</b>${spark()}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td><td>${r[6]}</td><td><button class="btn">加入雷达</button></td></tr>`).join("")}</tbody></table>`;
        function ready(limit=20){scanStatusBadge.className="badge ok";scanStatusBadge.textContent="可加入雷达";scanTableHost.innerHTML=table(rows.slice(0,Math.max(1,Math.min(rows.length,limit))));state(scannerResultsWrap)}
        function loading(){scanStatusBadge.className="badge gold";scanStatusBadge.textContent="正在扫描";scanTableHost.innerHTML=`<div class="state-card"><div class="spinner" aria-hidden="true"></div><h3>正在扫描候选池</h3><p>正在匹配市场、策略模板、数据完整性和风险限制。</p><div style="width:min(420px,100%);display:grid;gap:10px;margin-top:18px"><span class="skeleton"></span><span class="skeleton" style="width:82%"></span><span class="skeleton" style="width:64%"></span></div></div>`;state(scannerResultsWrap)}
        function empty(){scanStatusBadge.className="badge";scanStatusBadge.textContent="无候选";scanTableHost.innerHTML=`<div class="state-card"><span class="badge">Empty</span><h3>当前条件没有候选</h3><p>可以降低分数阈值、切换策略模板，或允许部分延迟数据进入扫描结果。</p><button class="btn gold" type="button" id="relaxFilter">放宽条件</button></div>`;document.getElementById("relaxFilter").addEventListener("click",()=>ready(5));state(scannerResultsWrap)}
        function error(){scanStatusBadge.className="badge danger";scanStatusBadge.textContent="需要复试";scanTableHost.innerHTML=`<div class="state-card"><span class="badge danger">Error</span><h3>部分数据源暂时不可用</h3><p>行情源延迟或连接不稳定。历史数据仍可用，建议稍后重试或切换到数据完整优先模式。</p><button class="btn primary" type="button" id="retryScan">重试扫描</button></div>`;document.getElementById("retryScan").addEventListener("click",()=>ready(5));state(scannerResultsWrap)}
        function mode(){if(scanMarket.value==="HK")return"empty";if(scanMarket.value==="CN"&&scanTemplate.value==="波动压缩突破")return"error";return"ready"}
        ready(5);
        runScan.addEventListener("click",()=>{
          runScan.disabled=true;
          loading();
          setTimeout(()=>{
            runScan.disabled=false;
            const m=mode();
            m==="empty"?empty():m==="error"?error():ready(+scanTop.value||20);
          },520);
        });
      }
      if(page==="scenario"){
        const update=()=>{
          shockVal.textContent="+"+shock.value+"%";
          timeVal.textContent=time.value+" 日";
          micro(document.querySelector('[data-od-id="signature-radar"]'));
        };
        shock.addEventListener("input",update);
        time.addEventListener("input",update);
      }
    }
    function bindSearch(){
      const input=document.getElementById("globalSearch");
      const box=document.getElementById("searchResults");
      input.addEventListener("input",()=>{
        const q=input.value.trim().toLowerCase();
        const matches=stocks.filter(s=>(s.symbol+s.name+s.note).toLowerCase().includes(q)).slice(0,5);
        if(q && !matches.length){
          box.innerHTML=`<div class="result-empty">没有找到匹配标的。可以尝试输入代码，例如 AAPL、NVDA 或 600519。</div>`;
        }else{
          box.innerHTML=matches.map((s,i)=>`<div class="result" data-symbol="${s.symbol}" role="option" tabindex="0" aria-selected="${i===0?"true":"false"}"><div><b>${s.symbol} · ${s.name}</b><br><span class="muted">${s.note}</span></div><span class="ticker">${s.price}</span></div>`).join("");
        }
        const open=q.length>0;
        box.classList.toggle("open",open);
        box.setAttribute("aria-hidden",open?"false":"true");
      });
      box.addEventListener("click",e=>{
        const r=e.target.closest(".result");
        if(!r)return;
        input.value=r.dataset.symbol;
        box.classList.remove("open");
        box.setAttribute("aria-hidden","true");
        render("stock",true);
      });
      box.addEventListener("keydown",e=>{
        if(e.key==="Enter"){
          const r=e.target.closest(".result");
          if(r){
            input.value=r.dataset.symbol;
            box.classList.remove("open");
            box.setAttribute("aria-hidden","true");
            render("stock",true);
          }
        }
      });
      window.addEventListener("keydown",e=>{
        if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){
          e.preventDefault();
          input.focus();
        }
        if(e.key==="Escape"){
          box.classList.remove("open");
          box.setAttribute("aria-hidden","true");
          closeMore();
        }
      });
    }
    function closeMore(){
      moreMenu.classList.remove("open");
      moreButton.setAttribute("aria-expanded","false");
    }
    moreButton.addEventListener("click",()=>{
      const open=!moreMenu.classList.contains("open");
      moreMenu.classList.toggle("open",open);
      moreButton.setAttribute("aria-expanded",open?"true":"false");
    });
    document.addEventListener("click",e=>{if(!e.target.closest("#moreMenu"))closeMore()});
    window.addEventListener("popstate",()=>render(currentPage(),false));
    bindRoutes();
    bindSearch();
    render(currentPage(),false);
  </script>
</body>
</html>
