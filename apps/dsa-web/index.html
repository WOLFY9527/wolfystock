<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="1024x1024" href="/wolfystock-logo-mark.png" />
    <link rel="shortcut icon" href="/wolfystock-logo-mark.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WolfyStock</title>
    <script>
      (() => {
        const themeStyle = 'paper';
        let colorMode = 'light';
        try {
          const storedMode = window.localStorage.getItem('dsa-theme-mode');
          colorMode = storedMode === 'light' || storedMode === 'dark' ? storedMode : 'light';
        } catch {
          colorMode = 'light';
        }
        document.documentElement.dataset.theme = colorMode;
        document.documentElement.dataset.themeStyle = themeStyle;
        document.documentElement.dataset.colorMode = colorMode;
        document.documentElement.classList.add(colorMode);
        document.documentElement.style.setProperty('--preboot-bg', '#F5F0EB');
      })();
    </script>
    <style>
      :root {
        color-scheme: light;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--preboot-bg, #F5F0EB);
      }
      #root {
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
