name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  qualification:
    name: repository-qualification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Select reviewed toolchains
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Online managed environment bootstrap
        run: |
          set -euo pipefail
          mkdir -p output/ci
          ./wolfy lock python --check > output/ci/python-lock-check.json
          ./wolfy bootstrap --ensure
          ./wolfy exec --profile test -- bash -c 'cd apps/dsa-web && export PLAYWRIGHT_BROWSERS_PATH="$PWD/../../output/ci/playwright-browsers" && npm exec -- playwright install chromium'
      - name: Qualify nested environment evidence
        run: |
          set -euo pipefail
          ./wolfy env verify
          ./wolfy qualify-env --output output/ci/environment-evidence.json
          ./wolfy exec --profile test -- python - <<'PY'
          import json
          evidence = json.load(open("output/ci/environment-evidence.json", encoding="utf-8"))
          assert evidence["status"] == "PASS"
          assert evidence["environmentEvidence"]["operational"]["bootstrapNetworkUsed"] is False
          PY
      - name: AI governance
        run: ./wolfy exec --profile test -- python scripts/check_ai_assets.py
      - name: Backend canonical gate
        run: ./scripts/ci_gate.sh
      - name: Full Vitest
        run: ./wolfy exec --profile test -- npm --prefix apps/dsa-web test -- --maxWorkers=1
      - name: Frontend lint
        run: ./wolfy exec --profile test -- npm --prefix apps/dsa-web run lint
      - name: Frontend typecheck
        run: ./wolfy exec --profile test -- python scripts/web_build_artifact.py typecheck
      - name: Production frontend build
        run: ./wolfy exec --profile test -- python scripts/web_build_artifact.py build --expected-sha "${GITHUB_SHA}"
      - name: Playwright smoke
        run: ./wolfy exec --profile test -- bash -c 'cd apps/dsa-web && export PLAYWRIGHT_BROWSERS_PATH="$PWD/../../output/ci/playwright-browsers" && npm exec -- playwright test --project=chromium --project=chromium-mobile'

  docker-build:
    name: docker-build
    runs-on: ubuntu-latest
    needs: qualification
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build reviewed-lock image
        run: docker build -t stock-analysis:test -f docker/Dockerfile .
      - name: Smoke image imports
        run: |
          docker run --rm stock-analysis:test python -c "from api.app import app; print(app.title)"
