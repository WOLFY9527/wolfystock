name: Create GitHub Release from Tag

# Trigger: version tag pushed (vX.Y.Z). Lightweight tags fail closed.
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate release metadata
        id: release_notes
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE=".github/release-notes/${TAG}.md"
          TAG_TYPE="$(git for-each-ref "refs/tags/${TAG}" --format='%(objecttype)')"

          if [[ "${TAG_TYPE}" != "tag" ]]; then
            echo "ERROR: ${TAG} is not an annotated tag."
            echo "Create annotated tags with: git tag -a ${TAG} -m '<release notes>'"
            exit 1
          fi

          TAG_NOTES="$(git tag -l --format='%(contents)' "${TAG}")"
          TAG_TITLE="$(printf '%s\n' "${TAG_NOTES}" | head -n 1)"
          TAG_BODY="$(printf '%s\n' "${TAG_NOTES}" | tail -n +2)"

          if [[ -n "${TAG_BODY//[[:space:]]/}" ]]; then
            BODY="${TAG_NOTES}"
            SOURCE="annotated tag body"
          elif [[ -n "${TAG_TITLE//[[:space:]]/}" && "${TAG_TITLE}" != "${TAG}" ]]; then
            BODY="${TAG_NOTES}"
            SOURCE="annotated tag message"
          elif [[ -f "${NOTES_FILE}" ]]; then
            if [[ ! -s "${NOTES_FILE}" ]]; then
              echo "ERROR: ${NOTES_FILE} exists but is empty."
              exit 1
            fi
            BODY="$(cat "${NOTES_FILE}")"
            SOURCE="${NOTES_FILE}"
          else
            echo "ERROR: ${TAG} has no non-empty annotated tag message/body and no explicit release notes file."
            echo "Provide a non-empty annotated tag message/body or add ${NOTES_FILE}."
            exit 1
          fi

          printf '%s' "$BODY" > /tmp/release_body.txt
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"

      - name: Run release secret scan
        run: ./scripts/release_secret_scan.sh

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend gate
        run: ./scripts/ci_gate.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_notes.outputs.tag }}
          name: ${{ steps.release_notes.outputs.tag }}
          body_path: /tmp/release_body.txt
          draft: false
          prerelease: false
          generate_release_notes: false
