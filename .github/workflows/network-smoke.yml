name: Network Smoke

on:
  schedule:
    - cron: '0 2 * * 1-5'
  workflow_dispatch:

concurrency:
  group: network-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: 🌐 Run pytest network smoke (non-blocking)
        continue-on-error: true
        run: |
          set -o pipefail
          set +e
          python -m pytest -m network --collect-only -q 2>&1 | tee pytest-network-collect.log
          collect_status=${PIPESTATUS[0]}
          set -e

          if grep -Eq '(^|[^0-9])0 selected' pytest-network-collect.log || grep -q 'no tests collected' pytest-network-collect.log; then
            echo "::error title=Empty network smoke pytest selection::python -m pytest -m network selected 0 tests during collect-only."
            if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
              {
                echo "### Network smoke pytest"
                echo ""
                echo ":x: \`python -m pytest -m network --collect-only -q\` selected 0 tests."
                echo ""
                echo "The pytest network phase is empty; add or restore network-marked tests before treating this smoke as covered."
              } >> "$GITHUB_STEP_SUMMARY"
            fi
            exit 1
          fi

          if [ "$collect_status" -ne 0 ]; then
            echo "::error title=Network smoke pytest collection failed::Collect-only check failed before running network tests."
            exit "$collect_status"
          fi

          python -m pytest -m network -q | tee pytest-network.log

      - name: 🚀 Run quick smoke (non-blocking)
        continue-on-error: true
        run: |
          set -o pipefail
          ./test.sh quick --no-notify | tee quick-smoke.log

      - name: 📤 Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: network-smoke-logs-${{ github.run_number }}
          path: |
            pytest-network-collect.log
            pytest-network.log
            quick-smoke.log
          if-no-files-found: ignore
